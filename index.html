<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perlynx</title>
    <link rel="icon" id="favicon" type="image/png">
    <style>
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: #1a1a1a; color: black; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        h1 { -webkit-background-clip: text; background-clip: text; color: transparent; background-size: cover; }
        .controls { position: fixed; top: 20px; left: 20px; z-index: 10; background: #f7f7f7; padding: 10px; border-radius: 12px; width: 260px; min-width: 180px; max-height: calc(100vh - 40px); display: grid; grid-template-columns: 1fr; gap: 8px; color: black; overflow: auto; transition: border-radius 0.25s, padding 0.25s, width 0.25s; resize: both; }
        .sliders-section { margin-bottom: 10px; }
        .sliders-section[open] { border-bottom: 1px solid #ccc; padding-bottom: 10px; }
        .colors-section { background: #e7e7e7; padding: 10px; border-radius: 8px; }
        .shapes-section { background: #e7e7e7; padding: 10px; border-radius: 8px; }
        .controls summary { cursor: pointer; font-size: 11px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; padding: 2px 0; user-select: none; list-style: none; }
        .controls summary::-webkit-details-marker { display: none; }
        .controls summary::before { content: ''; display: inline-block; border-left: 4px solid transparent; border-right: 4px solid transparent; border-top: 5px solid currentColor; border-bottom: none; margin-right: 4px; vertical-align: middle; }
        .controls details:not([open]) > summary::before { border-top: 4px solid transparent; border-bottom: 4px solid transparent; border-left: 5px solid currentColor; border-right: none; }
        .controls details { display: grid; gap: 8px; }
        .shapes-section select { flex: 1; background: #e7e7e7; border: 1px solid #bbb; border-radius: 4px; padding: 2px; font-size: 11px; }
        label { font-size: 12px; margin-bottom: 5px; color: black; text-transform: uppercase; letter-spacing: 1px; }
        .control-group { display: flex; flex-direction: column; align-items: center; width: 100%; }
        .color-inputs { display: flex; flex-direction: column; gap: 10px; }
        .color-buttons { display: flex; gap: 10px; justify-content: center; }
        #colorContainer { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        #colorContainer .control-group { align-items: center; width: auto; flex: 0 0 auto; }
        #colorContainer .control-group label { font-size: 10px; user-select: text; cursor: text; }
        .input-row { display: flex; gap: 6px; align-items: center; width: 100%; box-sizing: border-box; }
        .input-row input[type="range"] { flex: 1; min-width: 60px; background: transparent; }
        .input-row input[type="number"],
        .input-row input[type="color"],
        .input-row input[type="checkbox"] { width: 44px; flex-shrink: 0; background: #e7e7e7; border: 1px solid #bbb; color: black; }
        .input-row input[type="checkbox"] { width: auto; }
        input[type="range"]::-webkit-slider-runnable-track { height: 6px; border-radius: 4px; background: #bbb; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--thumb-color, black); margin-top: -4px; }
        input[type="range"]::-moz-range-track { height: 6px; border-radius: 4px; background: #bbb; }
        input[type="range"]::-moz-range-thumb { width: 14px; height: 14px; border-radius: 50%; background: var(--thumb-color, black); }
        button { padding: 6px 10px; border: none; border-radius: 6px; color: black; font-weight: bold; cursor: pointer; transition: 0.2s; background-size: cover; background-position: center; font-size: 11px; }
        button:hover { opacity: 0.9; }
        #menu-toggle { position: absolute; right: 6px; top: 6px; transform: none; padding: 0 !important; width: 22px; height: 22px; font-size: 16px; background: transparent !important; background-image: none !important; border-radius: 50% !important; display: flex; align-items: center; justify-content: center; opacity: 0.4; color: inherit; }
        #menu-toggle:hover { opacity: 1 !important; }
        .controls.collapsed { width: 80px !important; height: 80px !important; min-width: unset !important; border-radius: 12px !important; padding: 0 !important; gap: 0 !important; overflow: hidden !important; cursor: pointer !important; resize: none; }
        .controls.collapsed > *:not(#main-header) { display: none !important; }
        .controls.collapsed #main-header { padding: 0 !important; margin: 0 !important; border-bottom: none !important; justify-content: center; }
        .controls.collapsed h1, .controls.collapsed #menu-toggle { display: none; }
        canvas { background: #000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    </style>
</head>

<script>
// --- Simple Pseudo-Random Noise Logic ---
class SimpleNoise {
    constructor(seed) {
        this.p = new Uint8Array(512);
        const v = new Uint8Array(256);
        for (let i = 0; i < 256; i++) v[i] = i;
        
        let m = seed;
        for (let i = 255; i > 0; i--) {
            m = (m * 1103515245 + 12345) & 0x7fffffff;
            let j = m % (i + 1);
            [v[i], v[j]] = [v[j], v[i]];
        }
        for (let i = 0; i < 512; i++) this.p[i] = v[i & 255];
    }

    fade(t) { return t * t * t * (t * (t * 6 - 15) + 10); }
    lerp(t, a, b) { return a + t * (b - a); }
    grad(hash, x, y) {
        const h = hash & 15;
        const gradX = 1 + (h & 7); 
        const gradY = 1 + (h >> 3); 
        return ((h & 8) ? -gradX : gradX) * x + ((h & 4) ? -gradY : gradY) * y;
    }

    get(x, y) {
        const X = Math.floor(x) & 255;
        const Y = Math.floor(y) & 255;
        x -= Math.floor(x);
        y -= Math.floor(y);
        const u = this.fade(x);
        const v = this.fade(y);
        const p = this.p;

        const aa = p[p[X] + Y], ab = p[p[X] + Y + 1];
        const ba = p[p[X + 1] + Y], bb = p[p[X + 1] + Y + 1];

        return this.lerp(v, 
            this.lerp(u, this.grad(aa, x, y), this.grad(ba, x - 1, y)),
            this.lerp(u, this.grad(ab, x, y - 1), this.grad(bb, x - 1, y - 1))
        );
    }
}

let colorIndex = 2;

function addColor() {
    colorIndex++;
    const container = document.getElementById('colorContainer');
    const div = document.createElement('div');
    div.className = 'control-group';
    const defVal = '#000000';
    div.innerHTML = `<label>${defVal}</label><input type="color" id="color${colorIndex}" value="${defVal}">`;
    container.appendChild(div);
    _invalidateDOMCache();
    const newInput = document.getElementById(`color${colorIndex}`);
    newInput.addEventListener('change', () => {
        newInput.previousElementSibling.textContent = newInput.value;
        debouncedGenerate();
    });
    generate();
}

function removeColor() {
    if (colorIndex > 2) {
        const container = document.getElementById('colorContainer');
        container.removeChild(container.lastElementChild);
        _invalidateDOMCache();
        colorIndex--;
        generate();
    }
}

function randomizeSeed() {
    const seed = Math.floor(Math.random() * 99999);
    document.getElementById('seed').value = seed;
    document.getElementById('seed_num').value = seed;
    generate();
}

function downloadImage() {
    const a = document.createElement('a');
    a.href = canvasEl.toDataURL('image/png');
    a.download = 'perlynx-texture.png';
    a.click();
}

let generateTimer;
function debouncedGenerate() {
    cancelAnimationFrame(generateTimer);
    generateTimer = requestAnimationFrame(generate);
}

function getContrastColor(r, g, b) {
    const luminance = 0.2126 * r + 0.7152 * g + 0.0722 * b;
    return luminance > 150 ? 'black' : 'white';
}

function hexToRgb(hex) {
    const m = hex.match(/[0-9a-f]{2}/gi);
    return m ? m.slice(0, 3).map(x => parseInt(x, 16)) : [0, 0, 0];
}

// Mineral generation state
let mineralScatterSeed = 0;
let mineralsArray = [];
let lastMineralGenKey = '';
let cachedNoiseImageData = null;
let lastNoiseKey = '';

// Mineral interaction state
let selectedMineral = -1;
let isDraggingMineral = false;
let isResizingMineral = false;
let isRotatingMineral = false;
let mineralDragStartX = 0, mineralDragStartY = 0;
let mineralOrigCx = 0, mineralOrigCy = 0;
let mineralOrigSizeMult = 1;
let mineralOrigRotJitter = 0;
let mineralStartAngle = 0;
let mineralStartDist = 0;

const canvasEl = document.getElementById('canvas');
const _elCache = {};
function _el(id) { return _elCache[id] || (_elCache[id] = document.getElementById(id)); }

function scatterMinerals() {
    mineralScatterSeed = Math.floor(Math.random() * 99999);
    lastMineralGenKey = '';
    generate();
}

function generateMineralPositions() {
    const seed = parseInt(_el('seed').value);
    const shapeCount = parseInt(_el('shapeCount').value);
    const shapeArea = parseInt(_el('shapeArea').value) / 100;
    const resX = parseInt(_el('resX').value);
    const resY = parseInt(_el('resY').value);
    const shapeSeed = seed + 9999 + mineralScatterSeed;
    let rng = shapeSeed;
    const nextRand = () => { rng = (rng * 1103515245 + 12345) & 0x7fffffff; return rng / 0x7fffffff; };
    mineralsArray = [];
    for (let i = 0; i < shapeCount; i++) {
        const rx = nextRand();
        const ry = nextRand();
        const sizeMult = 0.7 + nextRand() * 0.6;
        const hueShift = (nextRand() - 0.5) * 30;
        const rotJitter = (nextRand() - 0.5) * 0.3;
        mineralsArray.push({
            cx: resX/2 + (rx - 0.5) * resX * shapeArea,
            cy: resY/2 + (ry - 0.5) * resY * shapeArea,
            sizeMult, hueShift, rotJitter, facetSeed: rng
        });
    }
    selectedMineral = -1;
}

function canvasToPixelCoords(e) {
    const rect = canvasEl.getBoundingClientRect();
    return {
        x: (e.clientX - rect.left) / rect.width * canvasEl.width,
        y: (e.clientY - rect.top) / rect.height * canvasEl.height
    };
}

function hitTestMineralZone(px, py) {
    const shapeSize = parseInt(_el('shapeSize').value);
    // Check selected mineral's rotate ring first
    if (selectedMineral >= 0 && selectedMineral < mineralsArray.length) {
        const m = mineralsArray[selectedMineral];
        const half = shapeSize * m.sizeMult / 2;
        const dx = px - m.cx, dy = py - m.cy;
        const dist2 = dx*dx + dy*dy;
        if (dist2 >= half*half && dist2 < (half*1.5)*(half*1.5)) {
            return { index: selectedMineral, zone: 'rotate' };
        }
    }
    // Check all minerals back-to-front for move/resize
    for (let i = mineralsArray.length - 1; i >= 0; i--) {
        const m = mineralsArray[i];
        const half = shapeSize * m.sizeMult / 2;
        const dx = px - m.cx, dy = py - m.cy;
        const dist2 = dx*dx + dy*dy;
        if (dist2 < half*half) {
            if (dist2 < (half*0.55)*(half*0.55)) return { index: i, zone: 'move' };
            return { index: i, zone: 'resize' };
        }
    }
    return null;
}

function drawMineralOutline(ctx, type, half) {
    ctx.beginPath();
    if (type === 'diamond') {
        ctx.moveTo(0, -half); ctx.lineTo(half, 0); ctx.lineTo(0, half); ctx.lineTo(-half, 0);
    } else if (type === 'square') {
        ctx.rect(-half, -half, half*2, half*2);
    } else if (type === 'circle') {
        ctx.arc(0, 0, half, 0, Math.PI*2);
    } else if (type === 'star') {
        for (let j = 0; j < 10; j++) {
            const r = j%2===0 ? half : half*0.4;
            const a = j*Math.PI/5 - Math.PI/2;
            j===0 ? ctx.moveTo(r*Math.cos(a), r*Math.sin(a)) : ctx.lineTo(r*Math.cos(a), r*Math.sin(a));
        }
    }
    ctx.closePath();
}

function getMineralFacets(type, half, numFacets, rng, depth) {
    const facets = [];
    if (type === 'diamond') {
        const outerPts = [[0,-half],[half,0],[0,half],[-half,0]];
        const innerOff = half * 0.1 * depth;
        for (let f = 0; f < 4; f++) {
            const a = outerPts[f], b = outerPts[(f+1)%4];
            const subCount = Math.max(1, Math.floor(numFacets / 4));
            for (let s = 0; s < subCount; s++) {
                const t0 = s/subCount, t1 = (s+1)/subCount;
                const p0 = [a[0]+(b[0]-a[0])*t0, a[1]+(b[1]-a[1])*t0];
                const p1 = [a[0]+(b[0]-a[0])*t1, a[1]+(b[1]-a[1])*t1];
                const jitter = (rng()-0.5) * innerOff;
                const ctr = [jitter, jitter];
                const dx = (p0[0]+p1[0])/2, dy = (p0[1]+p1[1])/2;
                const nx = dy * 0.01, ny = -dx * 0.01, nz = 1;
                const nl = Math.sqrt(nx*nx+ny*ny+nz*nz);
                facets.push({ pts: [ctr, p0, p1], cx: dx, cy: dy, nx: nx/nl, ny: ny/nl, nz: nz/nl });
            }
        }
    } else if (type === 'square') {
        const inset = half * (0.3 + depth * 0.2);
        facets.push({ pts: [[-inset,-inset],[inset,-inset],[inset,inset],[-inset,inset]], cx:0, cy:0, nx:0, ny:0, nz:1 });
        const outer = [[-half,-half],[half,-half],[half,half],[-half,half]];
        const inner = [[-inset,-inset],[inset,-inset],[inset,inset],[-inset,inset]];
        const sideNormals = [[0,-1,0.5],[1,0,0.5],[0,1,0.5],[-1,0,0.5]];
        for (let f = 0; f < 4; f++) {
            const a = outer[f], b = outer[(f+1)%4], c = inner[(f+1)%4], d = inner[f];
            const sn = sideNormals[f];
            const nl = Math.sqrt(sn[0]*sn[0]+sn[1]*sn[1]+sn[2]*sn[2]);
            facets.push({ pts: [a,b,c,d], cx:(a[0]+c[0])/2, cy:(a[1]+c[1])/2, nx:sn[0]/nl, ny:sn[1]/nl, nz:sn[2]/nl });
        }
    } else if (type === 'circle') {
        const rings = Math.max(2, Math.floor(numFacets / 2));
        const segs = Math.max(6, numFacets);
        for (let ring = 0; ring < rings; ring++) {
            const r0 = half * ring / rings, r1 = half * (ring+1) / rings;
            const elevInner = Math.sqrt(1 - (r0/half)*(r0/half));
            const elevOuter = Math.sqrt(1 - (r1/half)*(r1/half));
            for (let s = 0; s < segs; s++) {
                const a0 = s/segs * Math.PI*2, a1 = (s+1)/segs * Math.PI*2;
                const pts = [
                    [Math.cos(a0)*r0, Math.sin(a0)*r0],
                    [Math.cos(a0)*r1, Math.sin(a0)*r1],
                    [Math.cos(a1)*r1, Math.sin(a1)*r1],
                    [Math.cos(a1)*r0, Math.sin(a1)*r0]
                ];
                const mA = (a0+a1)/2;
                const mR = (r0+r1)/2;
                const nx = Math.cos(mA) * mR / half;
                const ny = Math.sin(mA) * mR / half;
                const nz = (elevInner + elevOuter) / 2;
                const nl = Math.sqrt(nx*nx+ny*ny+nz*nz) || 1;
                facets.push({ pts, cx: Math.cos(mA)*mR, cy: Math.sin(mA)*mR, nx:nx/nl, ny:ny/nl, nz:nz/nl });
            }
        }
    } else if (type === 'star') {
        const pts10 = [];
        for (let j = 0; j < 10; j++) {
            const r = j%2===0 ? half : half*0.4;
            const a = j*Math.PI/5 - Math.PI/2;
            pts10.push([r*Math.cos(a), r*Math.sin(a)]);
        }
        for (let j = 0; j < 10; j++) {
            const a = pts10[j], b = pts10[(j+1)%10];
            const mx = (a[0]+b[0])/2, my = (a[1]+b[1])/2;
            const dx = mx, dy = my;
            const nz = 1 + depth * 0.5;
            const nl = Math.sqrt(dx*dx*0.0001 + dy*dy*0.0001 + nz*nz);
            facets.push({ pts: [[0,0], a, b], cx: mx/2, cy: my/2, nx: dx*0.01/nl, ny: dy*0.01/nl, nz: nz/nl });
        }
    }
    return facets;
}

// Lazy-cached DOM queries for theming
let _cachedButtons, _cachedLabels, _cachedInputs, _cachedSummaries;
const _allButtons = () => _cachedButtons || (_cachedButtons = document.querySelectorAll('button:not(#menu-toggle)'));
const _allLabels = () => _cachedLabels || (_cachedLabels = document.querySelectorAll('label'));
const _allInputs = () => _cachedInputs || (_cachedInputs = document.querySelectorAll('.input-row input, .control-group input'));
const _allSummaries = () => _cachedSummaries || (_cachedSummaries = document.querySelectorAll('.controls summary'));
function _invalidateDOMCache() { _cachedButtons = _cachedLabels = _cachedInputs = _cachedSummaries = null; }

function generate() {
    const canvas = canvasEl;
    const ctx = canvas.getContext('2d');
    
    const resX = parseInt(_el('resX').value);
    const resY = parseInt(_el('resY').value);
    const pixelation = Math.max(1, parseInt(_el('pixelation').value));
    
    if (canvas.width !== resX || canvas.height !== resY) {
        canvas.width = resX;
        canvas.height = resY;
        cachedNoiseImageData = null;
        lastNoiseKey = '';
    }
    const canvasZoom = parseInt(_el('canvasZoom').value) / 100;
    canvas.style.width = Math.round(resX * canvasZoom) + 'px';
    canvas.style.height = Math.round(resY * canvasZoom) + 'px';

    const scaleInput = parseFloat(_el('scale').value);
    const octaves = parseInt(_el('octaves').value);
    const persistence = parseFloat(_el('persistence').value);
    const seed = parseInt(_el('seed').value);
    const power = parseFloat(_el('power').value);
    const invert = _el('invert').checked;
    
    const colors = Array.from(document.querySelectorAll('#colorContainer input')).map(inp => hexToRgb(inp.value));
    if (colors.length < 2) colors.push(colors.length ? colors[0] : [0,0,0]);

    if (!generate._noiseCache || generate._noiseCache.seed !== seed) {
        generate._noiseCache = { seed, instance: new SimpleNoise(seed) };
    }
    const noise = generate._noiseCache.instance;
    const noiseKey = [resX, resY, pixelation, scaleInput, octaves, persistence, seed, power, invert, colors.map(c => c.join(',')).join(';')].join(',');
    if (noiseKey !== lastNoiseKey) {
        lastNoiseKey = noiseKey;
        const imgData = ctx.createImageData(resX, resY);
        for (let y = 0; y < resY; y += pixelation) {
            for (let x = 0; x < resX; x += pixelation) {
                let noiseValue = 0;
                let amplitude = 1;
                let freq = 1 / scaleInput;
                let maxAmp = 0;

                for (let i = 0; i < octaves; i++) {
                    noiseValue += noise.get(x * freq, y * freq) * amplitude;
                    maxAmp += amplitude;
                    freq *= 2;
                    amplitude *= persistence;
                }

                let t = (noiseValue / maxAmp) * 0.5 + 0.5;
                t = Math.max(0, Math.min(1, t));
                t = Math.pow(t, power);
                if (invert) t = 1 - t; 

                let r, g, b;
                const numSegments = colors.length - 1;
                const segment = Math.min(Math.floor(t * numSegments), numSegments - 1);
                const localT = (t * numSegments) - segment;
                r = (1 - localT) * colors[segment][0] + localT * colors[segment + 1][0];
                g = (1 - localT) * colors[segment][1] + localT * colors[segment + 1][1];
                b = (1 - localT) * colors[segment][2] + localT * colors[segment + 1][2];

                // Fill the pixelation x pixelation block
                for (let dy = 0; dy < pixelation && y + dy < resY; dy++) {
                    for (let dx = 0; dx < pixelation && x + dx < resX; dx++) {
                        const index = ((x + dx) + (y + dy) * resX) * 4;
                        imgData.data[index] = r;
                        imgData.data[index + 1] = g;
                        imgData.data[index + 2] = b;
                        imgData.data[index + 3] = 255;
                    }
                }
            }
        }
        ctx.putImageData(imgData, 0, 0);
        cachedNoiseImageData = ctx.getImageData(0, 0, resX, resY);
    } else {
        ctx.putImageData(cachedNoiseImageData, 0, 0);
    }

    // Draw 3D mineral shapes overlay
    const shapesEnabled = _el('shapesEnabled').checked;
    if (shapesEnabled) {
        const genKey = [seed, _el('shapeCount').value, _el('shapeArea').value, resX, resY, mineralScatterSeed].join(',');
        if (genKey !== lastMineralGenKey) {
            lastMineralGenKey = genKey;
            generateMineralPositions();
        }

        const shapeType = _el('shapeType').value;
        const shapeSize = parseInt(_el('shapeSize').value);
        const shapeOpacity = parseInt(_el('shapeOpacity').value) / 100;
        const shapeRotation = parseInt(_el('shapeRotation').value) * Math.PI / 180;
        const shapeColorHex = _el('shapeColor').value;
        const shapeFacets = parseInt(_el('shapeFacets').value);
        const shapeDepth = parseInt(_el('shapeDepth').value) / 100;
        const [sR, sG, sB] = hexToRgb(shapeColorHex);

        const pixelateMinerals = _el('pixelateMinerals').checked;
        const shouldPixelate = pixelateMinerals && pixelation > 1;

        let drawCtx = ctx;
        let offCanvas = null;
        if (shouldPixelate) {
            if (!generate._offCanvas) generate._offCanvas = document.createElement('canvas');
            offCanvas = generate._offCanvas;
            drawCtx = offCanvas.getContext('2d');
            if (offCanvas.width !== resX || offCanvas.height !== resY) {
                offCanvas.width = resX;
                offCanvas.height = resY;
            } else {
                drawCtx.clearRect(0, 0, resX, resY);
            }
        }

        // Light direction (top-left)
        const lightX = -0.5, lightY = -0.7, lightZ = 0.5;
        const lightLen = Math.sqrt(lightX*lightX + lightY*lightY + lightZ*lightZ);
        const lx = lightX/lightLen, ly = lightY/lightLen, lz = lightZ/lightLen;

        for (let i = 0; i < mineralsArray.length; i++) {
            const m = mineralsArray[i];
            const sizeVar = shapeSize * m.sizeMult;
            const half = sizeVar / 2;

            drawCtx.save();
            drawCtx.translate(m.cx, m.cy);
            drawCtx.rotate(shapeRotation + m.rotJitter);

            // Drop shadow
            const shadowOff = half * 0.15 * shapeDepth;
            drawCtx.save();
            drawCtx.translate(shadowOff, shadowOff * 1.5);
            drawCtx.globalAlpha = shapeOpacity * 0.3 * shapeDepth;
            drawCtx.fillStyle = 'black';
            drawCtx.filter = `blur(${Math.max(1, half * 0.15)}px)`;
            drawMineralOutline(drawCtx, shapeType, half);
            drawCtx.fill();
            drawCtx.restore();
            drawCtx.filter = 'none';

            // Generate facet vertices (deterministic per mineral)
            let facetRng = m.facetSeed;
            const nextRandFacet = () => { facetRng = (facetRng * 1103515245 + 12345) & 0x7fffffff; return facetRng / 0x7fffffff; };
            const facets = getMineralFacets(shapeType, half, shapeFacets, nextRandFacet, shapeDepth);

            // Draw each facet with lighting
            for (const facet of facets) {
                const nx = facet.nx, ny = facet.ny, nz = facet.nz;
                const dot = Math.max(0, nx*lx + ny*ly + nz*lz);
                const ambient = 0.25;
                const diffuse = dot * 0.55;
                const specPow = 12;
                const hx = lx, hy = ly, hz = lz + 1;
                const hLen = Math.sqrt(hx*hx+hy*hy+hz*hz);
                const specDot = Math.max(0, (nx*hx+ny*hy+nz*hz)/hLen);
                const specular = Math.pow(specDot, specPow) * 0.7 * shapeDepth;
                const brightness = Math.min(1, ambient + diffuse);

                const noiseVal = noise.get((m.cx + facet.cx) * 0.05, (m.cy + facet.cy) * 0.05);
                const textureMod = 1 + noiseVal * 0.15 * shapeDepth;

                const fr = Math.max(0, Math.min(255, (sR + m.hueShift) * brightness * textureMod + specular * 255));
                const fg = Math.max(0, Math.min(255, sG * brightness * textureMod + specular * 255));
                const fb = Math.max(0, Math.min(255, (sB - m.hueShift * 0.5) * brightness * textureMod + specular * 255));

                drawCtx.globalAlpha = shapeOpacity;
                drawCtx.beginPath();
                drawCtx.moveTo(facet.pts[0][0], facet.pts[0][1]);
                for (let p = 1; p < facet.pts.length; p++) drawCtx.lineTo(facet.pts[p][0], facet.pts[p][1]);
                drawCtx.closePath();
                drawCtx.fillStyle = `rgb(${Math.round(fr)},${Math.round(fg)},${Math.round(fb)})`;
                drawCtx.fill();

                drawCtx.strokeStyle = `rgba(0,0,0,${0.2 * shapeDepth})`;
                drawCtx.lineWidth = 0.5;
                drawCtx.stroke();
            }

            // Specular highlight on top
            if (shapeDepth > 0.1) {
                const highlightR = half * 0.3;
                const grad = drawCtx.createRadialGradient(-half*0.2, -half*0.3, 0, -half*0.2, -half*0.3, highlightR);
                grad.addColorStop(0, `rgba(255,255,255,${0.5 * shapeDepth * shapeOpacity})`);
                grad.addColorStop(1, 'rgba(255,255,255,0)');
                drawCtx.globalAlpha = 1;
                drawCtx.fillStyle = grad;
                drawCtx.beginPath();
                drawCtx.arc(-half*0.2, -half*0.3, highlightR, 0, Math.PI*2);
                drawCtx.fill();
            }

            drawCtx.restore();
        }

        // Selection highlight
        if (selectedMineral >= 0 && selectedMineral < mineralsArray.length) {
            const m = mineralsArray[selectedMineral];
            const sizeVar = shapeSize * m.sizeMult;
            drawCtx.save();
            drawCtx.translate(m.cx, m.cy);
            drawCtx.rotate(shapeRotation + m.rotJitter);
            drawCtx.strokeStyle = 'rgba(255,255,255,0.8)';
            drawCtx.lineWidth = 2;
            drawCtx.setLineDash([4, 4]);
            drawMineralOutline(drawCtx, shapeType, sizeVar/2);
            drawCtx.stroke();
            drawCtx.setLineDash([]);
            drawCtx.restore();
        }

        // Pixelation compositing
        if (shouldPixelate && offCanvas) {
            const smallW = Math.max(1, Math.floor(resX / pixelation));
            const smallH = Math.max(1, Math.floor(resY / pixelation));
            if (!generate._smallCanvas) generate._smallCanvas = document.createElement('canvas');
            const smallCanvas = generate._smallCanvas;
            const smallCtx = smallCanvas.getContext('2d');
            if (smallCanvas.width !== smallW || smallCanvas.height !== smallH) {
                smallCanvas.width = smallW;
                smallCanvas.height = smallH;
            } else {
                smallCtx.clearRect(0, 0, smallW, smallH);
            }
            smallCtx.drawImage(offCanvas, 0, 0, smallW, smallH);
            ctx.imageSmoothingEnabled = false;
            ctx.drawImage(smallCanvas, 0, 0, resX, resY);
            ctx.imageSmoothingEnabled = true;
        }

        drawCtx.globalAlpha = 1;
    }

    const isInteracting = isDraggingMineral || isResizingMineral || isRotatingMineral;
    if (!isInteracting) {
        const brightness = parseInt(_el('menuBrightness').value);
        const menuColor = Math.round(25 + brightness * 1.8);
        const menuBg = `rgb(${menuColor}, ${menuColor}, ${menuColor})`;
        const sectionColor = Math.min(menuColor + 20, 255);
        const sectionBg = `rgb(${sectionColor}, ${sectionColor}, ${sectionColor})`;
        const contrast = getContrastColor(menuColor, menuColor, menuColor);

        const dataURL = canvas.toDataURL();
        document.querySelector('h1').style.backgroundImage = `url(${dataURL})`;
        const fillImg = document.getElementById('perlin-fill-img');
        if (fillImg) fillImg.setAttributeNS('http://www.w3.org/1999/xlink', 'href', dataURL);

        // Update favicon with perlin-filled logo
        const svgStr = new XMLSerializer().serializeToString(_el('perlynx-logo'));
        const svgBlob = new Blob([svgStr], { type: 'image/svg+xml;charset=utf-8' });
        const blobUrl = URL.createObjectURL(svgBlob);
        const favImg = new Image();
        favImg.onload = () => {
            if (!generate._favCanvas) { generate._favCanvas = document.createElement('canvas'); generate._favCanvas.width = 32; generate._favCanvas.height = 32; }
            const fctx = generate._favCanvas.getContext('2d');
            fctx.clearRect(0, 0, 32, 32);
            fctx.drawImage(favImg, 0, 0, 32, 32);
            URL.revokeObjectURL(blobUrl);
            _el('favicon').href = generate._favCanvas.toDataURL('image/png');
        };
        favImg.src = blobUrl;

        _allButtons().forEach(btn => {
            btn.style.backgroundImage = `url(${dataURL})`;
            btn.style.color = contrast;
        });
        const controlsEl = document.querySelector('.controls');
        const colorsSection = document.querySelector('.colors-section');
        controlsEl.style.backgroundColor = menuBg;
        controlsEl.style.color = contrast;
        colorsSection.style.backgroundColor = sectionBg;
        colorsSection.style.color = contrast;
        document.body.style.backgroundColor = sectionBg;
        controlsEl.style.setProperty('--thumb-color', contrast);
        _allLabels().forEach(label => label.style.color = contrast);
        _allSummaries().forEach(s => s.style.color = contrast);
        const shapesSection = document.querySelector('.shapes-section');
        if (shapesSection) { shapesSection.style.backgroundColor = sectionBg; shapesSection.style.color = contrast; }
        const shapeSelect = document.getElementById('shapeType');
        if (shapeSelect) { shapeSelect.style.backgroundColor = sectionBg; shapeSelect.style.borderColor = contrast === 'black' ? '#888' : '#ccc'; shapeSelect.style.color = contrast; }
        _allInputs().forEach(inp => {
            if (inp.type === 'checkbox') {
                inp.style.accentColor = contrast;
            } else {
                inp.style.backgroundColor = sectionBg;
                inp.style.borderColor = contrast === 'black' ? '#888' : '#ccc';
                inp.style.color = contrast;
            }
        });
    } // end if (!isInteracting)
}

const initialSeed = Math.floor(Math.random() * 99999);
document.getElementById('seed').value = initialSeed;
document.getElementById('seed_num').value = initialSeed;

generate();

document.querySelectorAll('input[type="range"]').forEach(range => {
    const num = document.getElementById(range.id + '_num');
    if (num) {
        range.addEventListener('input', () => num.value = range.value);
        num.addEventListener('input', () => range.value = num.value);
    }
});

document.querySelectorAll('input').forEach(input => {
    if (input.type === 'color') {
        input.addEventListener('change', () => {
            const label = input.closest('.control-group')?.querySelector('label');
            if (label && input.closest('#colorContainer')) label.textContent = input.value;
            debouncedGenerate();
        });
    } else if (input.type !== 'button') {
        input.addEventListener('input', () => debouncedGenerate());
    }
});

document.getElementById('shapeType').addEventListener('change', debouncedGenerate);

const controls = document.querySelector('.controls');
// Button event listeners
document.getElementById('btn-randomize').addEventListener('click', randomizeSeed);
document.getElementById('btn-download').addEventListener('click', downloadImage);
document.getElementById('btn-add-color').addEventListener('click', addColor);
document.getElementById('btn-remove-color').addEventListener('click', removeColor);
document.getElementById('btn-scatter').addEventListener('click', scatterMinerals);

// Panel drag state
let isPanelDragging = false;
let hasPanelDragged = false;
let panelOffsetX, panelOffsetY;
controls.style.cursor = 'grab';

document.getElementById('menu-toggle').addEventListener('click', (e) => {
    e.stopPropagation();
    controls.classList.add('collapsed');
    controls.style.cursor = 'pointer';
});

controls.addEventListener('mousedown', (e) => {
    hasPanelDragged = false;
    if (['INPUT','BUTTON','LABEL','SUMMARY','SELECT'].includes(e.target.tagName)) return;
    const rect = controls.getBoundingClientRect();
    if (!controls.classList.contains('collapsed') && e.clientX > rect.right - 16 && e.clientY > rect.bottom - 16) return;
    isPanelDragging = true;
    panelOffsetX = e.clientX - controls.offsetLeft;
    panelOffsetY = e.clientY - controls.offsetTop;
    if (!controls.classList.contains('collapsed')) controls.style.cursor = 'grabbing';
});

document.addEventListener('mousemove', (e) => {
    if (isPanelDragging) {
        hasPanelDragged = true;
        const newLeft = Math.max(-controls.offsetWidth + 40, Math.min(window.innerWidth - 40, e.clientX - panelOffsetX));
        const newTop = Math.max(0, Math.min(window.innerHeight - 40, e.clientY - panelOffsetY));
        controls.style.left = newLeft + 'px';
        controls.style.top = newTop + 'px';
    }
});

document.addEventListener('mouseup', () => {
    isPanelDragging = false;
    if (!controls.classList.contains('collapsed')) controls.style.cursor = 'grab';
});

controls.addEventListener('click', () => {
    if (hasPanelDragged) return;
    if (controls.classList.contains('collapsed')) {
        controls.classList.remove('collapsed');
        controls.style.cursor = 'grab';
    }
});

// Touch support
controls.addEventListener('touchstart', (e) => {
    if (['INPUT','BUTTON','LABEL','SUMMARY','SELECT'].includes(e.target.tagName)) return;
    const touch = e.touches[0];
    const rect = controls.getBoundingClientRect();
    if (!controls.classList.contains('collapsed') && touch.clientX > rect.right - 16 && touch.clientY > rect.bottom - 16) return;
    hasPanelDragged = false;
    isPanelDragging = true;
    panelOffsetX = touch.clientX - controls.offsetLeft;
    panelOffsetY = touch.clientY - controls.offsetTop;
}, { passive: true });

document.addEventListener('touchmove', (e) => {
    if (isPanelDragging) {
        hasPanelDragged = true;
        const touch = e.touches[0];
        const newLeft = Math.max(-controls.offsetWidth + 40, Math.min(window.innerWidth - 40, touch.clientX - panelOffsetX));
        const newTop = Math.max(0, Math.min(window.innerHeight - 40, touch.clientY - panelOffsetY));
        controls.style.left = newLeft + 'px';
        controls.style.top = newTop + 'px';
        e.preventDefault();
    }
}, { passive: false });

document.addEventListener('touchend', () => {
    if (isPanelDragging) {
        isPanelDragging = false;
        if (!hasPanelDragged && controls.classList.contains('collapsed')) {
            controls.classList.remove('collapsed');
            controls.style.cursor = 'grab';
        }
        if (!controls.classList.contains('collapsed')) controls.style.cursor = 'grab';
    }
});

// Canvas mineral interaction
const ZONE_CURSORS = { move: 'move', resize: 'nwse-resize', rotate: 'crosshair' };

function startMineralAction(x, y, zoneHit) {
    selectedMineral = zoneHit.index;
    const m = mineralsArray[zoneHit.index];
    mineralDragStartX = x;
    mineralDragStartY = y;
    mineralOrigCx = m.cx;
    mineralOrigCy = m.cy;
    mineralOrigSizeMult = m.sizeMult;
    mineralOrigRotJitter = m.rotJitter;
    mineralStartDist = Math.sqrt((x - m.cx)**2 + (y - m.cy)**2);
    mineralStartAngle = Math.atan2(y - m.cy, x - m.cx);
    if (zoneHit.zone === 'move') isDraggingMineral = true;
    else if (zoneHit.zone === 'resize') isResizingMineral = true;
    else if (zoneHit.zone === 'rotate') isRotatingMineral = true;
}

canvasEl.addEventListener('mousedown', (e) => {
    if (!_el('shapesEnabled').checked) return;
    const {x, y} = canvasToPixelCoords(e);
    const zoneHit = hitTestMineralZone(x, y);
    if (zoneHit) {
        startMineralAction(x, y, zoneHit);
        e.preventDefault();
        generate();
    } else {
        if (selectedMineral >= 0) { selectedMineral = -1; generate(); }
    }
});

canvasEl.addEventListener('mousemove', (e) => {
    if (!_el('shapesEnabled').checked) return;
    if (isDraggingMineral && selectedMineral >= 0) {
        const {x, y} = canvasToPixelCoords(e);
        mineralsArray[selectedMineral].cx = mineralOrigCx + (x - mineralDragStartX);
        mineralsArray[selectedMineral].cy = mineralOrigCy + (y - mineralDragStartY);
        generate();
    } else if (isResizingMineral && selectedMineral >= 0) {
        const {x, y} = canvasToPixelCoords(e);
        const m = mineralsArray[selectedMineral];
        const dist = Math.sqrt((x - mineralOrigCx)**2 + (y - mineralOrigCy)**2);
        const ratio = mineralStartDist > 0 ? dist / mineralStartDist : 1;
        m.sizeMult = Math.max(0.1, mineralOrigSizeMult * ratio);
        generate();
    } else if (isRotatingMineral && selectedMineral >= 0) {
        const {x, y} = canvasToPixelCoords(e);
        const m = mineralsArray[selectedMineral];
        const angle = Math.atan2(y - m.cy, x - m.cx);
        m.rotJitter = mineralOrigRotJitter + (angle - mineralStartAngle);
        generate();
    } else {
        const {x, y} = canvasToPixelCoords(e);
        const zoneHit = hitTestMineralZone(x, y);
        canvasEl.style.cursor = zoneHit ? ZONE_CURSORS[zoneHit.zone] : '';
    }
});

document.addEventListener('mouseup', () => {
    isDraggingMineral = false;
    isResizingMineral = false;
    isRotatingMineral = false;
});

// Canvas touch support for minerals
function touchToPixel(touch) {
    const rect = canvasEl.getBoundingClientRect();
    return {
        x: (touch.clientX - rect.left) / rect.width * canvasEl.width,
        y: (touch.clientY - rect.top) / rect.height * canvasEl.height
    };
}

canvasEl.addEventListener('touchstart', (e) => {
    if (!_el('shapesEnabled').checked) return;
    const {x, y} = touchToPixel(e.touches[0]);
    const zoneHit = hitTestMineralZone(x, y);
    if (zoneHit) {
        startMineralAction(x, y, zoneHit);
        e.preventDefault();
        generate();
    }
}, { passive: false });

canvasEl.addEventListener('touchmove', (e) => {
    if (selectedMineral < 0) return;
    const {x, y} = touchToPixel(e.touches[0]);
    const m = mineralsArray[selectedMineral];
    if (isDraggingMineral) {
        m.cx = mineralOrigCx + (x - mineralDragStartX);
        m.cy = mineralOrigCy + (y - mineralDragStartY);
    } else if (isResizingMineral) {
        const dist = Math.sqrt((x - mineralOrigCx)**2 + (y - mineralOrigCy)**2);
        const ratio = mineralStartDist > 0 ? dist / mineralStartDist : 1;
        m.sizeMult = Math.max(0.1, mineralOrigSizeMult * ratio);
    } else if (isRotatingMineral) {
        const angle = Math.atan2(y - m.cy, x - m.cx);
        m.rotJitter = mineralOrigRotJitter + (angle - mineralStartAngle);
    }
    e.preventDefault();
    generate();
}, { passive: false });

canvasEl.addEventListener('touchend', () => {
    isDraggingMineral = false;
    isResizingMineral = false;
    isRotatingMineral = false;
});

</script>
